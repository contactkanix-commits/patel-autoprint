# Render deployment config for Patel AutoPrint
# Free tier: web service (sleeps after 15 min idle) + free PostgreSQL (256 MB, 90-day expiry)

# --- PostgreSQL database (free tier) — top-level key, NOT inside services ---
databases:
  - name: patel-autoprint-db
    databaseName: patel_autoprint
    user: patel
    plan: free
    ipAllowList: [] # empty = internal connections only (Render sets this)

# --- Services (web / worker / cron / static only) ---
services:
  # Node.js backend — also serves the built frontend from ../frontend/dist
  - type: web
    name: patel-autoprint
    runtime: node
    plan: free
    region: oregon # change to frankfurt / singapore if closer to you
    branch: main
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: patel-autoprint-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: FRONTEND_DIR
        value: ../frontend/dist
